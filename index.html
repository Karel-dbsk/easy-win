<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WinPro</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#0b0b0b;
    color:white;
    text-align:center;
}
header {
    padding:50px;
    background:linear-gradient(90deg,#000,#1a1a1a);
}
h1 {
    color:gold;
    font-size:42px;
}
.subtitle {
    color:#aaa;
}
.container {
    padding:40px;
}
.card {
    background:#141414;
    padding:20px;
    margin:20px auto;
    border-radius:15px;
    max-width:500px;
    box-shadow:0 0 20px rgba(255,215,0,0.2);
}
.vip {
    filter: blur(6px);
}
button {
    background:gold;
    color:black;
    padding:15px 30px;
    border:none;
    border-radius:10px;
    font-size:18px;
    cursor:pointer;
}
footer {
    margin-top:40px;
    font-size:12px;
    color:gray;
}
</style>
</head>

<body>

<header>
    <h1>WINPRO</h1>
    <p class="subtitle">Analyses sportives professionnelles</p>
</header>

<div class="container">

    <div class="card">
        <h2>📊 Analyse du jour</h2>
        <p id="date"></p>
        <p id="ai"></p>
    </div>

    <div class="card vip">
        <h2>🔒 Pronostics VIP</h2>
        <p id="vip">Chargement des pronostics...</p>
    </div>

    <div class="card">
        <h2>💎 Accès VIP</h2>
        <p>Accès aux pronostics premium</p>
        <button onclick="window.location.href='https://ton-lien-stripe.com'">
            Devenir VIP
        </button>
    </div>

</div>

<footer>
⚠️ Les paris comportent des risques. Aucun gain garanti.
</footer>

<script>
const equipes = [
"PSG","Marseille","Lyon","Monaco",
"Real Madrid","Barcelona","Atletico Madrid",
"Manchester City","Liverpool","Chelsea","Arsenal",
"Bayern Munich","Dortmund","Leipzig",
"Juventus","AC Milan","Inter Milan",
"LA Galaxy","Inter Miami","New York City",
"Chicago Fire","Seattle Sounders"
];

const analyses = [
"Victoire probable équipe domicile",
"Plus de 2.5 buts",
"Les deux équipes marquent",
"Match serré",
"Value bet détecté"
];

// Analyse du jour
function generateAI(){
    let e1 = equipes[Math.floor(Math.random()*equipes.length)];
    let e2 = equipes[Math.floor(Math.random()*equipes.length)];

    while(e1 === e2){
        e2 = equipes[Math.floor(Math.random()*equipes.length)];
    }

    let analyse = analyses[Math.floor(Math.random()*analyses.length)];

    document.getElementById("ai").innerText =
    e1 + " vs " + e2 + " → " + analyse;

    const today = new Date();
    document.getElementById("date").innerText =
    "Analyse du " + today.toLocaleDateString();
}

// Pronostics VIP (20 matchs)
function genererVIP(){
    let resultat = "";

    for(let i=0;i<20;i++){
        let e1 = equipes[Math.floor(Math.random()*equipes.length)];
        let e2 = equipes[Math.floor(Math.random()*equipes.length)];

        while(e1 === e2){
            e2 = equipes[Math.floor(Math.random()*equipes.length)];
        }

        let analyse = analyses[Math.floor(Math.random()*analyses.length)];

        resultat += e1 + " vs " + e2 + " → " + analyse + "<br><br>";
    }

    document.getElementById("vip").innerHTML = resultat;
}

generateAI();
genererVIP();
</script>

</body>
</html>
